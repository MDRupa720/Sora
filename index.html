<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
display:flex;
justify-content:center;
align-items:center;

.container{
width:350px;
padding:20px;

}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #00e5ff;

.profile h1{

.box{

align-items:center;
justify-content:center;
gap:12px;
height:65px;
margin-top:18px;
border-radius:16px;
color:#fff;
font-size:20px;
font-weight:bold;
text-decoration:none;
transition:.3s;
box-shadow:0 0 15px rgba(255,255,255,.15);
}

.box:hover{
transform:translateY(-5px) scale(1.03);
}

.facebook{
background:linear-gradient(90deg,#1877F2,#0A4DA8);
}

.whatsapp{
background:linear-gradient(90deg,#25D366,#128C7E);
}

.telegram{
background:linear-gradient(90deg,#2AABEE,#0088CC);
}

i{
font-size:28px;
}
h4{
  color:#FF5959;
  margin-top:25px;
}
</style>
</head>

<div class="container">
